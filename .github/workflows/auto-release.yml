name: Auto Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Find release commit in push
        id: version
        env:
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: |
          VERSION=$(echo "$COMMITS_JSON" | jq -r '.[] | select(.message | startswith("chore: release v")) | .message' | head -n1 | grep -oP 'v\d+\.\d+\.\d+' || true)
          if [ -z "$VERSION" ]; then
            echo "No 'chore: release v<version>' commit in this push, skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Extract changelog for this version
        id: changelog
        if: steps.version.outputs.skip != 'true'
        env:
          VERSION_TAG: ${{ steps.version.outputs.version }}
        run: |
          VERSION_NUM="${VERSION_TAG#v}"
          CHANGELOG=$(awk "/^## \[${VERSION_NUM}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
      - name: Create tag and release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --title "$VERSION" --notes "$RELEASE_NOTES"
