# Claude Warden - Default Configuration Reference
#
# Copy to ~/.claude/warden.yaml (user-level) or .claude/warden.yaml (project-level) to customize.
#
# Config priority: project > user > built-in defaults.
# Within each scope, alwaysDeny is checked before alwaysAllow, and the first
# scope with a matching rule wins (e.g. a project rule overrides a user rule
# for the same command).

# Default decision for commands not covered by any rule: allow | deny | ask
defaultDecision: ask

# If true, commands containing $() or backticks trigger "ask"
askOnSubshell: true

# Send OS notifications when warden prompts for permission or blocks a command.
# On macOS, uses terminal-notifier (click to activate terminal) or osascript fallback.
# On Linux, uses notify-send.
notifyOnAsk: true
notifyOnDeny: true

# Additional commands to always allow (checked after alwaysDeny within this scope)
# alwaysAllow:
#   - terraform
#   - flyctl
#   - my-safe-tool

# Additional commands to always deny (checked first within this scope)
# alwaysDeny:
#   - nc
#   - ncat

# Trusted SSH hosts — ssh/scp/rsync to these hosts are auto-allowed.
# Remote commands on trusted hosts are recursively evaluated through warden rules.
# Supports glob patterns (* wildcards).
# Entries can be strings (use global overrides) or objects with per-target settings.
# trustedSSHHosts:
#   - devserver                          # string → uses global overrides only
#   - staging-*
#   - "*.internal.company.com"
#   - name: prod-bastion                 # object with per-target overrides
#     overrides:
#       alwaysAllow: [systemctl]

# Trusted Docker containers — docker exec to these containers are auto-allowed.
# Remote commands are recursively evaluated through warden rules.
# trustedDockerContainers:
#   - my-app                             # string → uses global overrides only
#   - name: dev-container                # object with allowAll (skip all checks)
#     allowAll: true
#   - name: staging-*                    # object with per-target overrides
#     overrides:
#       alwaysAllow: [sudo, apt]

# Trusted kubectl contexts — kubectl exec in these contexts are auto-allowed.
# Remote commands (after --) are recursively evaluated through warden rules.
# trustedKubectlContexts:
#   - minikube
#   - name: dev-cluster-*
#     overrides:
#       alwaysAllow: [sudo]
#   - name: prod-cluster
#     overrides:
#       alwaysDeny: [rm]

# Trusted Sprites — sprite exec/console to these sprites are auto-allowed.
# Remote commands are recursively evaluated through warden rules.
# trustedSprites:
#   - my-sprite                          # string → uses global overrides only
#   - name: yudu-claw                    # allowAll: skip all checks (disposable env)
#     allowAll: true
#   - name: dev-*                        # per-target overrides
#     overrides:
#       alwaysAllow: [sudo, apt]

# Trusted Fly.io apps — fly ssh console to these apps are auto-allowed.
# Remote commands (-C or after --) are recursively evaluated through warden rules.
# trustedFlyApps:
#   - my-fly-app
#   - name: staging-*
#     allowAll: true
#   - name: prod-app
#     overrides:
#       alwaysAllow: [sudo, apt]

# Override rules when evaluating commands inside trusted remote contexts
# (docker exec, kubectl exec, ssh, sprite exec). These overrides are applied
# as the highest-priority layer only for remote command evaluation.
# trustedContextOverrides:
#   alwaysAllow:
#     - sudo
#     - apt
#     - apt-get
#   alwaysDeny: []
#   rules: []

# Command-specific rules (override built-in rules by command name).
# The first scope (project > user > default) with a rule for a given command wins.
#
# IMPORTANT: Rules are matched by the command being executed, not by arguments.
# For example, when Claude runs `python -c "import foo"`, warden looks up rules
# for command: "python" — NOT "bash" or "sh". A common mistake is writing rules
# for "bash" with argPatterns matching "python"; this won't work because warden
# sees the command as "python".
#
# rules:
#   # Allow all python commands
#   - command: python
#     default: allow
#
#   # Allow python -c but ask for other python usage
#   - command: python
#     default: ask
#     argPatterns:
#       - match:
#           anyArgMatches: ['^-c$']
#         decision: allow
#         description: Allow python -c inline scripts
#
#   # Allow all node.js execution
#   - command: node
#     default: allow
#
#   # Trust all npx in this project
#   - command: npx
#     default: allow
#
#   # Docker with selective allow
#   - command: docker
#     default: ask
#     argPatterns:
#       - match:
#           anyArgMatches: ['^(ps|images|logs)$']
#         decision: allow
#         description: Read-only docker commands
